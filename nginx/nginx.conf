worker_processes auto;
events { worker_connections 1024; }

http {
  server_tokens off;
  client_max_body_size 12m;
  proxy_read_timeout 120s;

  # Redirect all plain HTTP to HTTPS.
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # TLS is terminated here → safe to assert HSTS.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Re-resolve upstream container IPs per request via Docker's embedded DNS, so a recreated
    # api/web container (new IP after a deploy) is picked up WITHOUT an nginx reload — prevents the
    # stale-upstream-IP "502 Bad Gateway" after `docker compose up -d`.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_backend api:4000;
    set $web_backend web:3000;

    # Outbound-agent console tunnel (WebSocket) → NestJS. Long-lived; MUST be above /api/.
    location /api/agent/tunnel {
      proxy_pass http://$api_backend$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # API → NestJS (keeps the /api prefix the app expects).
    location /api/ {
      proxy_pass http://$api_backend$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # Agentic AI chat / analysis run local CPU LLM inference — allow long responses.
      proxy_read_timeout 240s;
      proxy_send_timeout 240s;
    }

    # Guacamole console WebSocket → API's guacamole-lite bridge (long-lived sessions).
    location /guac {
      proxy_pass http://$api_backend$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # Everything else → Next.js web.
    location / {
      proxy_pass http://$web_backend$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # Security headers for the web UI (add_header here overrides inheritance → re-assert HSTS).
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
      add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'self'; base-uri 'self'; object-src 'none'" always;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
